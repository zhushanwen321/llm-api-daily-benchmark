probes:
  # 1. REST API - CRUD操作
  - id: backend_rest_crud_001
    category: REST_API
    type: code_generation
    difficulty: medium
    prompt: |
      用Python FastAPI实现一个用户管理REST API，包含以下端点：
      - GET /users - 获取用户列表
      - POST /users - 创建新用户
      - GET /users/{user_id} - 获取单个用户
      - PUT /users/{user_id} - 更新用户信息
      - DELETE /users/{user_id} - 删除用户
      
      用户模型包含：id, username, email, created_at字段。
      使用Pydantic进行数据验证，返回合适的HTTP状态码。
    expected_behavior: "生成完整的FastAPI CRUD代码，包含数据模型和路由"
    validation_criteria:
      - "定义用户数据模型"
      - "实现GET端点"
      - "实现POST端点"
      - "实现PUT端点"
      - "实现DELETE端点"
      - "使用Pydantic验证"
    test_cases:
      - "用户列表查询"
      - "用户创建"
      - "用户更新"
      - "用户删除"

  - id: backend_rest_crud_002
    category: REST_API
    type: code_generation
    difficulty: medium
    prompt: |
      用Python Flask实现一个图书管理REST API：
      - GET /books - 列出所有图书
      - POST /books - 添加新书（title, author, isbn, price）
      - GET /books/<id> - 获取图书详情
      - PATCH /books/<id> - 部分更新图书
      - DELETE /books/<id> - 删除图书
      
      返回JSON格式，包含分页支持（page, per_page参数）。
    expected_behavior: "生成Flask REST API代码，包含分页和错误处理"
    validation_criteria:
      - "图书数据模型"
      - "GET /books分页"
      - "POST创建图书"
      - "PATCH部分更新"
      - "JSON响应格式"
    test_cases:
      - "分页查询"
      - "创建图书"
      - "更新图书"

  # 2. 数据库操作
  - id: backend_db_001
    category: database
    type: code_generation
    difficulty: medium
    prompt: |
      用SQLAlchemy实现一个订单处理模块：
      1. 定义Order和OrderItem模型（一对多关系）
      2. 创建订单时需要验证库存
      3. 实现事务性下单：创建订单 -> 扣减库存 -> 提交
      4. 包含回滚机制
      5. 添加索引优化查询
    expected_behavior: "生成包含事务管理的数据库操作代码"
    validation_criteria:
      - "Order模型定义"
      - "OrderItem模型定义"
      - "一对多关系配置"
      - "事务性操作"
      - "库存验证逻辑"
      - "回滚机制"
    test_cases:
      - "创建订单"
      - "库存扣减"
      - "事务回滚"

  - id: backend_db_002
    category: database
    type: code_generation
    difficulty: hard
    prompt: |
      实现一个缓存层模块，使用Redis：
      1. 装饰器@cache装饰函数，自动缓存结果
      2. 支持TTL过期时间
      3. 缓存击穿保护（单个key过期时只有一个请求回源）
      4. 缓存雪崩防护（随机TTL）
      5. 提供缓存清除方法
    expected_behavior: "生成完整的Redis缓存封装代码"
    validation_criteria:
      - "缓存装饰器实现"
      - "TTL支持"
      - "击穿保护"
      - "雪崩防护"
      - "清除方法"
    test_cases:
      - "缓存命中"
      - "缓存穿透"
      - "缓存更新"

  # 3. 认证与授权
  - id: backend_auth_001
    category: authentication
    type: code_generation
    difficulty: hard
    prompt: |
      实现JWT认证中间件：
      1. 生成JWT token（包含user_id, exp, role）
      2. 验证token有效性
      3. Token刷新机制（refresh_token）
      4. 装饰器@require_auth验证请求
      5. 支持token黑名单（logout）
    expected_behavior: "生成JWT完整实现代码"
    validation_criteria:
      - "JWT生成函数"
      - "JWT验证函数"
      - "Token刷新"
      - "认证装饰器"
      - "黑名单机制"
    test_cases:
      - "Token生成"
      - "Token验证"
      - "Token刷新"
      - "用户登出"

  - id: backend_auth_002
    category: authentication
    type: code_generation
    difficulty: medium
    prompt: |
      实现OAuth2密码模式认证：
      1. /oauth/token端点（用户名密码换取access_token）
      2. 密码加密存储（bcrypt）
      3. Access token生成（JWT）
      4. Token过期检查中间件
      5. Refresh token支持
    expected_behavior: "生成OAuth2密码模式认证代码"
    validation_criteria:
      - "Token端点"
      - "密码加密"
      - "JWT生成"
      - "过期检查"
      - "Refresh token"
    test_cases:
      - "登录认证"
      - "Token验证"
      - "Token刷新"

  # 4. 数据处理
  - id: backend_data_001
    category: data_processing
    type: code_generation
    difficulty: medium
    prompt: |
      实现一个数据导入导出服务：
      1. CSV导入（支持大文件流式处理）
      2. Excel导出（多sheet）
      3. 数据转换器（字段映射）
      4. 进度回调
      5. 错误跳过和日志记录
    expected_behavior: "生成完整的数据导入导出代码"
    validation_criteria:
      - "CSV流式导入"
      - "Excel多sheet导出"
      - "字段映射"
      - "进度回调"
      - "错误处理"
    test_cases:
      - "大文件导入"
      - "Excel导出"
      - "数据转换"

  - id: backend_data_002
    category: data_processing
    type: code_generation
    difficulty: hard
    prompt: |
      实现一个实时数据管道：
      1. 消息队列生产者（Kafka）
      2. 消费者组实现
      3. 消息序列化/反序列化
      4. 重试机制和死信队列
      5. 消息去重
      6. 偏移量管理
    expected_behavior: "生成完整的Kafka消息队列代码"
    validation_criteria:
      - "生产者实现"
      - "消费者组"
      - "序列化"
      - "重试机制"
      - "死信队列"
      - "去重逻辑"
    test_cases:
      - "消息发送"
      - "消息消费"
      - "重试机制"

  # 5. 微服务相关
  - id: backend_ms_001
    category: microservices
    type: code_generation
    difficulty: hard
    prompt: |
      实现服务注册与发现模块：
      1. 服务注册（服务名、地址、端口、健康检查URL）
      2. 服务心跳机制
      3. 服务发现（负载均衡策略：轮询、随机、加权）
      4. 健康检查端点
      5. 服务下线处理
    expected_behavior: "生成完整的服务注册发现代码"
    validation_criteria:
      - "服务注册"
      - "心跳机制"
      - "服务发现"
      - "负载均衡"
      - "健康检查"
      - "下线处理"
    test_cases:
      - "服务注册"
      - "健康检查"
      - "负载均衡"

  - id: backend_ms_002
    category: microservices
    type: code_generation
    difficulty: hard
    prompt: |
      实现API网关中间件：
      1. 请求路由（基于路径、header、参数）
      2. 熔断器模式（Hystrix风格）
      3. 限流（令牌桶算法）
      4. 请求/响应日志
      5. CORS跨域处理
      6. 请求超时控制
    expected_behavior: "生成完整的API网关代码"
    validation_criteria:
      - "请求路由"
      - "熔断器"
      - "限流算法"
      - "日志记录"
      - "CORS处理"
      - "超时控制"
    test_cases:
      - "路由转发"
      - "熔断触发"
      - "限流验证"
