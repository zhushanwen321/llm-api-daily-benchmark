# LLM Benchmark 统一配置
# 合并自 default.yaml + models.yaml
# default.yaml 和 models.yaml 已废弃，保留仅为兼容

# 基准测试默认参数 (原 default.yaml)
defaults:
  model: "glm-4.7"
  temperature: 0.0
  max_tokens: 4096
  max_retries: 3
  timeout: 300
  dataset_root: "benchmark/datasets"
  difficulty_weights:
    easy: 1.0
    medium: 1.5
    hard: 2.0

# 模型级别默认参数 (原 models.yaml defaults)
model_defaults:
  max_tokens: 131072

# 模型提供商配置 (原 models.yaml providers)
providers:
  zai:
    api_key: ${ZAI_API_KEY}
    api_base: "https://open.bigmodel.cn/api/coding/paas/v4"
    max_concurrency: 2
    models:
      glm-4.7:
        thinking:
          enabled: true
      glm-5:
        thinking:
          enabled: true
          reasoning_field: reasoning_content
      glm-5.1:
        thinking:
          enabled: true
          reasoning_field: reasoning_content
      glm-5-turbo:
        thinking:
          enabled: true
          reasoning_field: reasoning_content

  minimax:
    api_key: ${MINIMAX_API_KEY}
    api_base: "https://api.minimaxi.com/v1"
    rate_limit: 2
    models:
      MiniMax-M2.7:
        thinking:
          enabled: true
          reasoning_field: reasoning_details
          request_params:
            reasoning_split: true
      MiniMax-M2.7-highspeed: {}
      MiniMax-M2.5:
        thinking:
          enabled: true
          reasoning_field: reasoning_details
          request_params:
            reasoning_split: true
      MiniMax-M2.5-highspeed: {}

  kimi:
    api_key: "sk-kimi-8LW8PbWBxy5l159Dj5GRaKxBYdRqw6V0iPyZX5v0TQP3PDwNlUkPKYg17hgW0hQx"
    api_base: "https://api.kimi.com/coding/v1"
    rate_limit: 2
    models:
      kimi-for-coding:
        thinking:
          enabled: true
          reasoning_field: reasoning_content

  opencode-go-gk:
    api_key: "sk-3VbpbmZhGxrkdiOyIyabRUXHATOYgSatbhsKSxzbyEXmsTQiedIbLuBduI0W7oSj"
    api_base: "https://opencode.ai/zen/go/v1"
    rate_limit: 4
    models:
      glm-5:
        thinking:
          enabled: true
          reasoning_field: reasoning_content
      kimi-k2.5:
        thinking:
          enabled: true
          reasoning_field: reasoning

  opencode-go-minimax:
    api_key: "sk-3VbpbmZhGxrkdiOyIyabRUXHATOYgSatbhsKSxzbyEXmsTQiedIbLuBduI0W7oSj"
    api_base: "https://opencode.ai/zen/go/v1/messages"
    rate_limit: 2
    models:
      minimax-m2.7:
        thinking:
          enabled: true
          reasoning_field: reasoning_details
          request_params:
            reasoning_split: true
      minimax-m2.5:
        thinking:
          enabled: true
          reasoning_field: reasoning_details
          request_params:
            reasoning_split: true
